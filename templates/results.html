<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Health Analysis Report</title>
</head>
<body style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);">
    <div class="header" style="background: transparent; padding: 40px 0;">
        <h1 class="logo">📊 Health Analysis</h1>
    </div>
    <div class="report-container" style="max-width: 800px; margin: 0 auto; padding: 20px;">
        <div id="status-header" style="text-align: center; margin-bottom: 30px;"></div>
        <div id="results-list"></div>
        <button onclick="window.location.href='/predict'" class="analyze-btn" style="max-width: 250px; margin: 30px auto; display: block;">Run New Analysis</button>
    </div>
    <script>
        const results = JSON.parse(localStorage.getItem('healthResults'));
        const listDiv = document.getElementById('results-list');
        const headerDiv = document.getElementById('status-header');
        const warningItems = results.filter(r => r.risk !== "Low");

        if (warningItems.length === 0) {
        // --- UNIFORM SUCCESS CARD (replaces the big green block) ---
        // Header title above the card
        headerDiv.innerHTML = `<h2 style="color: #43e97b; font-size: 30px; text-align: center; margin-bottom: 40px;">✅ Your Health Summary</h2>`;

        // The card itself
        listDiv.innerHTML = `
            <div class="big-card-result success">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
                    <h2 style="color: #0f2027; margin: 0;">Overall Health Status</h2>
                    <div class="percent-circle">100%</div>
                </div>
                
                <p style="font-size: 20px; color: #333; margin: 25px 0 15px; font-weight: bold;">You're in Good Health!</p>
                <p style="font-size: 16px; color: #666; line-height: 1.6;">Our analysis shows that all your health markers are in the safe zone. Keep up the great lifestyle choices!</p>
                
                <div style="text-align: center;">
                    <div class="verified-badge">
                        Verified by HealthLens AI Engine
                    </div>
                </div>
            </div>
        `;
    } else {
            headerDiv.innerHTML = `<h2 style="color: #ff4d6d; font-size: 26px;">⚠️ You may be at the risk of:</h2>`;
            warningItems.forEach(r => {
                listDiv.innerHTML += `
                    <div class="big-card-result ${r.risk.toLowerCase()}">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
                            <h2 style="color: #0f2027; margin: 0;">${r.name}</h2>
                            <div class="percent-circle">${r.percentage}%</div>
                        </div>
                        <p style="font-size: 18px; margin: 20px 0 10px;">You have a <b>${r.percentage}%</b> possibility of having this disease.</p>
                        <span class="risk-label-tag">${r.risk} Risk</span>
                        <div style="margin-top: 25px;">
                            <h3 style="color: #2c5364;">🔍 Why you have this risk:</h3>
                            <ul style="color: #444;">${r.reasons.map(re => `<li>${re}</li>`).join('')}</ul>
                        </div>
                        <div style="margin-top: 20px;">
                            <h3 style="color: #2c5364;">🛡️ Prevention & Precautions:</h3>
                            <ul style="color: #444;">${r.tips.map(t => `<li>${t}</li>`).join('')}</ul>
                        </div>
                        ${r.note ? `<p class="pro-tip-box">💡 ${r.note}</p>` : ''}
                    </div>`;
            });
        }
    </script>
    <style>
    /* The Vibrant "All Clear" Card */
    .success-card {
        background: rgb(31, 174, 34);
        backdrop-filter: blur(15px);
        border: 2px solid #f0f0f0;
        border-radius: 25px;
        padding: 60px 40px;
        text-align: center;
        box-shadow: 0 20px 50px rgb(79, 195, 118);
        animation: slideUp 0.8s ease-out;
    }

    .success-icon {
        font-size: 80px;
        margin-bottom: 20px;
        display: block;
    }

    .success-card h2 {
        font-size: 38px;
        color: #fdfffe;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .success-card p {
        font-size: 20px;
        color: #e0e0e0;
        line-height: 1.6;
    }

    /* Animation for the card */
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* The Uniform "All Clear" Card (replaces the vibrant block) */
    .big-card-result.success {
        border-left-color: #43e97b; /* The vibrant green border on the left */
        box-shadow: 0 10px 25px rgba(67, 233, 123, 0.15); /* Soft green glow shadow */
    }

    /* Keep the verified badge styling for inside the card */
    .verified-badge {
        display: inline-block;
        background: white;
        color: #2c5364; /* Matching your theme text color */
        padding: 8px 18px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        margin-top: 25px;

    /* FIX #2: The 'Analyze Another' button spacing */
    .results-page-btn {
        margin-top: 50px !important; /* Forces the button DOWN from the card */
    }

    /* Ensuring background is even at the bottom of the screen */
    html, body {
        height: 100%;
        margin: 0;
    }

    /* Background animation from image_0.png */
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
}  
</style>
</body>
</html>
