<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Simplified Report</title>
</head>
<body style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white;">

<div class="header" style="background: transparent; padding: 40px 0;">
    <h1 class="logo">📄 Simplied Medical Report</h1>
    
</div>

<div class="report-container" style="max-width: 950px; margin: 0 auto; padding: 20px;">
    
    <div class="big-card-result" style="border-left: 15px solid #43e97b; min-height: 500px; padding: 50px;">
        <h2 style="color: #0f2027; font-size: 32px; border-bottom: 3px solid #eee; padding-bottom: 15px; margin-bottom: 30px;">
            Full Report Breakdown
        </h2>

        <div id="full-report-content"></div>

        <div style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; text-align: center;">
            <p style="color: #666; font-style: italic;">This summary is provided for informational purposes. Please consult your healthcare provider for a clinical diagnosis.</p>
        </div>
    </div>
    
    <button onclick="window.location.href='/simplify'" class="analyze-btn" style="max-width: 300px; margin: 40px auto; display: block;">Analyze Another Report</button>
</div>

<script>
    // 1. Get the data from memory
    const rawData = localStorage.getItem('simplifiedReport');
    const contentDiv = document.getElementById('full-report-content');

    if (!rawData) {
        contentDiv.innerHTML = `<p style="color: #333;">No report data found. Please try again.</p>`;
    } else {
        const data = JSON.parse(rawData);
        let htmlContent = "";

        // --- SECTION 1: SIMPLE HUMAN SUMMARY ---
        htmlContent += `
            <div style="background: #f0f7ff; color: #2c3e50; padding: 25px; border-radius: 15px; margin-bottom: 40px; border-left: 8px solid #3498db;">
                <h3 style="margin-top:0; color: #2980b9;">👋 The Big Picture</h3>
                <p style="font-size: 19px; line-height: 1.8;">${data.simple_summary}</p>
            </div>
        `;

        // --- SECTION 2: MEDICATION GUIDE (If found) ---
        if (data.medication_guide && data.medication_guide.length > 0) {
            htmlContent += `
                <div style="background: #fff5f5; padding: 25px; border-radius: 15px; margin-bottom: 40px; border: 1px solid #feb2b2;">
                    <h3 style="color: #c53030; margin-top:0;">💊 Your Medication Guide</h3>
                    <div style="overflow-x: auto;">
                        <table style="width:100%; border-collapse: collapse; color: #333; margin-top: 10px;">
                            <tr style="border-bottom: 2px solid #fed7d7; text-align: left;">
                                <th style="padding:12px;">Medicine</th>
                                <th style="padding:12px;">Purpose</th>
                                <th style="padding:12px;">When to Take</th>
                            </tr>
                            ${data.medication_guide.map(m => `
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding:12px;"><strong>${m.name}</strong></td>
                                    <td style="padding:12px;">${m.purpose}</td>
                                    <td style="padding:12px; color: #c53030; font-weight: bold;">${m.timing}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                </div>
            `;
        }

        // --- SECTION 3: COMPLEX TERMS (The Cards) ---
        htmlContent += `<h3 style="color: #2c5364; border-bottom: 2px solid #eee; padding-bottom: 10px;">📖 Term Explanations</h3>`;
        data.term_explanations.forEach((item, index) => {
            htmlContent += `
                <div class="report-entry" style="margin-bottom: 35px; padding: 20px; border: 1px solid #f0f0f0; border-radius: 12px;">
                    <h4 style="color: #2c5364; font-size: 22px; margin: 0 0 10px 0;">
                        ${item.term}
                    </h4>
                    <p style="color: #444; font-size: 17px; line-height: 1.7; margin-bottom: 15px;">
                        ${item.meaning}
                    </p>
                    <div style="background: #f0fdf4; padding: 12px 15px; border-radius: 8px; border-left: 5px solid #166534;">
                        <strong style="color: #166534;">💡 Tip:</strong>
                        <span style="color: #166534; margin-left: 5px;">${item.tip}</span>
                    </div>
                </div>
            `;
        });

        // --- SECTION 4: FRIENDLY SUGGESTIONS ---
        if (data.general_suggestions && data.general_suggestions.length > 0) {
            htmlContent += `
                <div style="background: #f0fff4; padding: 25px; border-radius: 15px; color: #22543d; margin-top: 30px; border: 1px solid #c6f6d5;">
                    <h3 style="margin-top:0;">🌱 Helpful Suggestions</h3>
                    <ul style="font-size: 17px; line-height: 1.9;">
                        ${data.general_suggestions.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                </div>
            `;
        }
        
        contentDiv.innerHTML = htmlContent;
    }
</script>
</body>
</html>
