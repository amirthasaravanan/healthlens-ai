<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Predict</title>
</head>
<body>
<div class="header">
    <h1 class="logo">🏥 HealthLens AI</h1>
    <p class="main-desc">◕ Analyze your health metrics to detect potential risks ◕</p>
</div>
<div class="form-container">
    <form>
        <div class="input-group"><input type="number" name="age" required><label>Age</label></div>
        <div class="input-group"><input type="number" name="bp" required><label>Blood Pressure</label></div>
        <div class="input-group"><input type="number" name="sugar" required><label>Blood Sugar</label></div>
        <div class="input-group"><input type="number" name="bmi" required><label>BMI</label></div>
        <div class="input-group">
            <select name="smoking" required>
                <option value="" disabled selected></option>
                <option>Non-Smoker</option>
                <option>Smoker</option>
            </select>
            <label>Smoking Habit</label>
        </div>
        <div class="input-group">
            <select name="activity" required>
                <option value="" disabled selected></option>
                <option>Low Activity</option>
                <option>Moderate</option>
                <option>High Activity</option>
            </select>
            <label>Physical Activity</label>
        </div>
        <button type="button" class="analyze-btn" onclick="predictDisease()">Analyze Risk</button>
    </form>
</div>
<p class="disclaimer">This tool provides general health insights and is not a substitute for professional medical advice.</p>
<script src="/static/script.js"></script>
</body>
</html>
